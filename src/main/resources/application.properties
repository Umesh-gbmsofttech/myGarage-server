spring.application.name=my-garage-app

server.address=0.0.0.0
server.port=8080

# mysql DB connection settings for aiven db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql-11b54541-dip-computer.j.aivencloud.com:23412/defaultdb?sslMode=VERIFY_CA
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# mysql DB connection settings for localhost
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.url=jdbc:mysql://localhost:3306/user?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=root

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn

app.admin.role=Super_Admin
app.admin.username=MyGarageAdmin
app.admin.name=Admin
app.admin.email=${ADMIN_MAIL_ID}
app.admin.password=${ADMIN_PASS}

app.image.max-size-bytes=10485760

api.keys.open-ai=${OPEN_AI}
api.keys.open-route-service=${ORS_MAP}
api.keys.map.tiler=${MAP_TILER}

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB







