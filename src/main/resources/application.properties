spring.application.name=my-garage-app

server.address=0.0.0.0
server.port=${PORT:8080}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
spring.jpa.open-in-view=false
spring.data.jpa.repositories.bootstrap-mode=deferred
spring.main.lazy-initialization=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

app.admin.email=${ADMIN_EMAIL:admin@gmail.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.role=Super_Admin
app.admin.username=MyGarageAdmin
app.admin.name=Admin

api.keys.map.ors=${ORS_MAP:}
api.keys.map.tiler=${MAP_TILER:}
api.keys.open-ai=${OPEN_AI:}



# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.image.max-size-bytes=10485760




