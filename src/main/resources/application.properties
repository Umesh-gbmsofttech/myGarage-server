spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:skillmate001@gmail.com}
spring.mail.password=${MAIL_PASSWORD:hhhu hhht ghhf thhq}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:skillmate001@gmail.com}



